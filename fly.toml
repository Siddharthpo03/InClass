# Fly.io configuration for InClass Backend
app = "inclass-backend"
primary_region = "sin"  # Singapore - change to your closest region

[build]
dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[[services]]
  protocol = "tcp"
  internal_port = 4000
  processes = ["app"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "5s"

[metrics]
  port = 9090
  path = "/metrics"

[[vm]]
  memory = "512MB"
  cpus = 1

[deploy]
  max_retries = 3
  strategy = "canary"
